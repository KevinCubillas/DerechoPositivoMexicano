<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Consulta Jurídica - Derecho Positivo</title>
    <style>
        /* ESTILOS DE INTERFAZ Y MAQUETACIÓN SIMÉTRICA */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #e0e0e0;
        }
        header {
            background-color: #1a1a1a;
            border-bottom: 2px solid #d4af37;
            padding: 20px;
            text-align: center;
        }
        header h1 {
            color: #d4af37;
            margin: 0;
            font-size: 24px;
            letter-spacing: 1px;
        }
        .contenedor-principal {
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
        }
        /* Panel de Filtros Lateral */
        .panel-filtros {
            background-color: #1a1a1a;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #333;
            height: fit-content;
        }
        .grupo-filtro {
            margin-bottom: 15px;
        }
        .grupo-filtro label {
            display: block;
            margin-bottom: 5px;
            color: #d4af37;
            font-weight: bold;
            font-size: 14px;
        }
        .grupo-filtro select, .grupo-filtro input {
            width: 100%;
            padding: 8px;
            background-color: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
        }
        /* Área de Visualización de Artículos */
        .area-contenido {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .tarjeta-ley {
            background-color: #1a1a1a;
            border-left: 5px solid #d4af37;
            border-radius: 4px;
            padding: 20px;
            border-top: 1px solid #333;
            border-right: 1px solid #333;
            border-bottom: 1px solid #333;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .tarjeta-ley h3 {
            margin: 0 0 5px 0;
            color: #fff;
            font-size: 18px;
        }
        .tarjeta-ley h4 {
            margin: 0 0 10px 0;
            color: #d4af37;
            font-size: 15px;
        }
        .meta-info {
            font-size: 12px;
            color: #888;
            margin-bottom: 10px;
        }
        .texto-ley {
            line-height: 1.6;
            color: #cccccc;
            text-align: justify;
        }
        .jurisprudencia-bloque {
            background: rgba(212, 175, 55, 0.05);
            padding: 15px;
            border-left: 3px solid #d4af37;
            margin-top: 15px;
            border-radius: 0 4px 4px 0;
            font-size: 13.5px;
        }
        .jurisprudencia-bloque strong {
            color: #d4af37;
        }
    </style>
</head>
<body>

    <header>
        <h1>SISTEMA DE CONSULTA DEL ORDENAMIENTO JURÍDICO MEXICANO</h1>
        <div style="color: #888; font-size: 12px; margin-top: 5px;">Canales de Sincronización Automatizada Activos</div>
    </header>

    <div class="contenedor-principal">
        <!-- BARRA LATERAL: FILTROS DE BÚSQUEDA -->
        <div class="panel-filtros">
            <div class="grupo-filtro">
                <label for="search">Buscador Transversal:</label>
                <input type="text" id="search" placeholder="Ej. flagrancia, dolo, de los derechos...">
            </div>
            <div class="grupo-filtro">
                <label for="ambito">Ámbito de Validez:</label>
                <select id="ambito">
                    <option value="todos">-- Todos los Ámbitos --</option>
                    <option value="federal">Federal / Nacional</option>
                    <option value="estatal">Estatal / Local</option>
                    <option value="internacional">Internacional</option>
                </select>
            </div>
            <div class="grupo-filtro">
                <label for="categoria">Categoría Normativa:</label>
                <select id="categoria">
                    <option value="todos">-- Todas las Categorías --</option>
                </select>
            </div>
            <div class="grupo-filtro">
                <label for="ley">Ordenamiento Específico:</label>
                <select id="ley">
                    <option value="todos">-- Todos los Ordenamientos --</option>
                </select>
            </div>
        </div>

        <!-- PANEL CENTRAL: RENDERIZADO DINÁMICO DE DATOS -->
        <div class="area-contenido" id="contenedor-articulos">
            <!-- Los artículos se inyectan automáticamente desde JavaScript aquí -->
        </div>
    </div>

    <!-- Vinculamos primero la base de datos que actualiza el robot de GitHub -->
    <script src="base-datos.js"></script>

    <script>
        // Mapeo dinámico de menús para mantener la coherencia de clasificaciones jurídicas
        const categoriesPorAmbito = {
            federal: ["Constitución", "Leyes Generales / Marco", "Leyes Nacionales", "Leyes Federales", "Códigos Federales"],
            estatal: ["Constitución Local", "Códigos Locales", "Leyes Estatales"],
            internacional: ["Derechos Humanos", "Derecho Laboral / Social", "Comercio e Internacional Privado"]
        };

        const catalogoLeyes = {
            federal: { 
                "Constitución": ["Constitución Política (CPEUM)"], 
                "Leyes Generales / Marco": ["Ley General de Víctimas"], 
                "Leyes Nacionales": [], 
                "Leyes Federales": ["Ley Federal del Trabajo"],
                "Códigos Federales": ["Código Penal Federal", "Código Nacional de Procedimientos Penales"] 
            },
            estatal: { 
                "Constitución Local": ["Constitución Política del Estado"], 
                "Códigos Locales": ["Código Civil Local"], 
                "Leyes Estatales": ["Ley de Desarrollo Urbano"] 
            },
            internacional: { 
                "Derechos Humanos": ["Convención Americana sobre DDHH (Pacto de San José)"], 
                "Derecho Laboral / Social": ["Convenio 87 de la OIT (Libertad Sindical)"], 
                "Comercio e Internacional Privado": ["T-MEC"] 
            }
        };

        // EVENTO INICIAL: Al cargar el sitio lee los datos del robot
        document.addEventListener("DOMContentLoaded", () => {
            // Verificar si la base de datos externa existe
            if (typeof articulosMundiales !== 'undefined' && articulosMundiales.length > 0) {
                console.log("Datos cargados correctamente:", articulosMundiales.length);
                // Pintamos los datos en pantalla al iniciar
                mostrarArticulos(articulosMundiales);
            } else {
                document.getElementById("contenedor-articulos").innerHTML = `
                    <div class="tarjeta-ley" style="border-left-color: #ff4d4d;">
                        <h3>⚠️ Error de enlace de datos</h3>
                        <p>El archivo 'base-datos.js' no se ha generado o está vacío. Ejecuta el Workflow en GitHub Actions primero.</p>
                    </div>`;
            }

            // Escuchar cambios en los elementos de filtrado
            document.getElementById("ambito").addEventListener("change", manejarCambioAmbito);
            document.getElementById("categoria").addEventListener("change", manejarCambioCategoria);
            document.getElementById("ley").addEventListener("change", filtrarEstructura);
            document.getElementById("search").addEventListener("input", filtrarEstructura);
        });

        // FUNCION: Renderiza las tarjetas de los artículos en el HTML
        function mostrarArticulos(lista) {
            const contenedor = document.getElementById("contenedor-articulos");
            contenedor.innerHTML = "";

            if (lista.length === 0) {
                contenedor.innerHTML = `
                    <div class="tarjeta-ley" style="border-left-color: #888;">
                        <h3>Ningún resultado encontrado</h3>
                        <p>Intente cambiando los criterios de filtro o la palabra clave en el buscador transversal.</p>
                    </div>`;
                return;
            }

            lista.forEach(art => {
                const tarjeta = document.createElement("div");
                tarjeta.className = "tarjeta-ley";
                tarjeta.innerHTML = `
                    <h3>${art.ley}</h3>
                    <h4>${art.numero}</h4>
                    <div class="meta-info">Ámbito: ${art.ambito.toUpperCase()} | Categoría: ${art.categoria} | Estado: ${art.estadoNorma}</div>
                    <p class="texto-ley">${art.texto}</p>
                    <div class="jurisprudencia-bloque">
                        <strong>Interpretación / Jurisprudencia SCJN vinculada:</strong><br>
                        ${art.jurisprudencia}
                    </div>
                `;
                contenedor.appendChild(tarjeta);
            });
        }

        // CONTROLADOR: Cambios en el filtro Ámbito
        function manejarCambioAmbito() {
            const ambitoSel = document.getElementById("ambito").value;
            const catSelect = document.getElementById("categoria");
            const leySelect = document.getElementById("ley");

            catSelect.innerHTML = '<option value="todos">-- Todas las Categorías --</option>';
            leySelect.innerHTML = '<option value="todos">-- Todos los Ordenamientos --</option>';

            if (ambitoSel !== "todos" && categoriesPorAmbito[ambitoSel]) {
                categoriesPorAmbito[ambitoSel].forEach(c => {
                    catSelect.innerHTML += `<option value="${c}">${c}</option>`;
                });
            }
            filtrarEstructura();
        }

        // CONTROLADOR: Cambios en el filtro Categoría
        function manejarCambioCategoria() {
            const ambitoSel = document.getElementById("ambito").value;
            const catSel = document.getElementById("categoria").value;
            const leySelect = document.getElementById("ley");

            leySelect.innerHTML = '<option value="todos">-- Todos los Ordenamientos --</option>';

            if (ambitoSel !== "todos" && catSel !== "todos" && catalogoLeyes[ambitoSel][catSel]) {
                catalogoLeyes[ambitoSel][catSel].forEach(l => {
                    leySelect.innerHTML += `<option value="${l}">${l}</option>`;
                });
            }
            filtrarEstructura();
        }

        // MOTOR DE BÚSQUEDA Y FILTRADO INTEGRADO
        function filtrarEstructura() {
            const txtBusqueda = document.getElementById("search").value.toLowerCase().trim();
            const filterAmbito = document.getElementById("ambito").value;
            const filterCategoria = document.getElementById("categoria").value;
            const filterLey = document.getElementById("ley").value;

            // Si el archivo no cargó, frena la función
            if (typeof articulosMundiales === 'undefined') return;

            const resultadosFiltrados = articulosMundiales.filter(item => {
                // Filtro 1: Ámbito
                if (filterAmbito !== "todos" && item.ambito !== filterAmbito) return false;
                // Filtro 2: Categoría
                if (filterCategoria !== "todos" && item.categoria !== filterCategoria) return false;
                // Filtro 3: Ordenamiento Específico
                if (filterLey !== "todos" && item.ley !== filterLey) return false;
                // Filtro 4: Buscador de texto transversal
                if (txtBusqueda !== "") {
                    const coincidenciaTexto = item.texto.toLowerCase().includes(txtBusqueda);
                    const coincidenciaNumero = item.numero.toLowerCase().includes(txtBusqueda);
                    const coincidenciaLey = item.ley.toLowerCase().includes(txtBusqueda);
                    const coincidenciaJuris = item.jurisprudencia.toLowerCase().includes(txtBusqueda);
                    
                    if (!coincidenciaTexto && !coincidenciaNumero && !coincidenciaLey && !coincidenciaJuris) return false;
                }
                return true;
            });

            mostrarArticulos(resultadosFiltrados);
        }
    </script>
</body>
</html>
