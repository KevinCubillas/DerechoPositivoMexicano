name: Sincronizacion Automatica del DOF y Camara

# Programamos el robot para que corra todos los días automáticamente
on:
  schedule:
    - cron: '0 12 * * *' # Se ejecuta en la madrugada (Hora Centro de México)
  workflow_dispatch: # Este botón te permite forzar la actualización manualmente cuando quieras

jobs:
  actualizar-base-datos:
    runs-on: ubuntu-latest

    steps:
    # 1. Descarga los archivos de tu repositorio al servidor virtual de GitHub
    - name: Descargar repositorio actual
      uses: actions/checkout@v4

    # 2. Instala el entorno de Node.js en el servidor de la nube
    - name: Configurar Entorno de Ejecucion
      uses: actions/setup-node@v4
      with:
        node-version: 20

    # 3. Instala Puppeteer (el navegador invisible) directamente en la nube
    - name: Instalar Extractor Automatico
      run: npm install puppeteer

    # 4. Ejecuta tu script scraper.js para obtener las leyes reales
    - name: Ejecutar Rastreo Oficial
      run: node scraper.js

    # 5. Guarda los cambios en tu base-datos.js y actualiza tu página web automáticamente
    - name: Guardar y Desplegar Cambios en la Red
      run: |
        git config --global user.name 'Sincronizador Automático'
        git config --global user.email 'bot@derechomexicano.com'
        git add base-datos.js
        git diff --quiet && git diff --staged --quiet || (git commit -m "Sincronización automática: $(date +'%Y-%m-%d')" && git push)
